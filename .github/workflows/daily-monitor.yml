name: PNRR AI Opportunity Monitor

on:
  schedule:
    # GitHub cron is UTC. These two entries cover Italy's summer/winter offset;
    # the guard step below lets only the run that lands at 14:45 Europe/Rome continue.
    - cron: "45 12 * * *"
    - cron: "45 13 * * *"
  workflow_dispatch:
    inputs:
      ai_mode:
        description: "AI judging mode"
        type: choice
        default: "capped"
        options: ["off", "capped", "full"]
      ai_budget:
        description: "Max AI calls per run (capped mode)"
        default: "500"

# Never let two runs overlap (avoids double-processing and commit races).
concurrency:
  group: pnrr-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Explicit rather than relying on GitHub's default (also 360): a full pass
    # over ~2000 schools has taken close to this before, and the rotating
    # checkpoint means a run that hits this ceiling still makes forward
    # progress next time instead of losing everything.
    timeout-minutes: 360
    permissions:
      contents: write   # to commit the dedup state back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Italy-time schedule
        id: italy_time
        if: ${{ github.event_name == 'schedule' }}
        run: |
          hour=$(TZ=Europe/Rome date +%H)
          if [ "$hour" = "14" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not the 14:45 Europe/Rome run. Skipping."
          fi

      - name: Install OCR system packages
        if: ${{ github.event_name != 'schedule' || steps.italy_time.outputs.should_run == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-ita

      - name: Set up uv (installs Python from pyproject)
        if: ${{ github.event_name != 'schedule' || steps.italy_time.outputs.should_run == 'true' }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        if: ${{ github.event_name != 'schedule' || steps.italy_time.outputs.should_run == 'true' }}
        run: uv sync

      - name: Run monitor
        if: ${{ github.event_name != 'schedule' || steps.italy_time.outputs.should_run == 'true' }}
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          BCC_EMAIL: ${{ secrets.BCC_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_VERIFICATION_REQUIRED: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}   # optional; empty -> local SQLite
        # Runs the REAL funded list (data/projects_funded.csv). That file must be
        # generated (scripts/extract_ministry_pdf.py), mapped (--map), and committed.
        run: |
          uv run python run_monitor.py \
            --projects data/projects_funded.csv \
            --ai-mode "${{ github.event.inputs.ai_mode || 'capped' }}" \
            --ai-budget "${{ github.event.inputs.ai_budget || '500' }}" \
            --monitor-workers 8

      - name: Persist dedup state
        # Only needed when using the SQLite fallback (no DATABASE_URL). With
        # Postgres the state lives in the DB and this is a no-op diff.
        if: ${{ always() && (github.event_name != 'schedule' || steps.italy_time.outputs.should_run == 'true') }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Force-add: these are gitignored for local hygiene but deliberately
          # committed in CI to persist dedup state across runs (SQLite fallback).
          git add -f monitor_history.sqlite3 run_log.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update monitor state [skip ci]"
            git push
          fi
